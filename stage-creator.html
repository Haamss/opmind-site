<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRÉATEUR DE STAGE — OpMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300;400;500;600&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #131318;
    --surface-2: #1c1c22;
    --line: rgba(235, 229, 210, 0.08);
    --line-2: rgba(235, 229, 210, 0.16);
    --ink: #ebe5d2;
    --dim: rgba(235, 229, 210, 0.55);
    --dim-2: rgba(235, 229, 210, 0.32);
    --red: #e84a3a;
    --red-deep: #9d2618;
    --green: #5ad99b;
    --amber: #f5a623;
    --display: "Antonio", "Bebas Neue", sans-serif;
    --sans: "Geist", -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    height: 100%;
    overflow: hidden;
  }
  ::selection { background: var(--red); color: var(--ink); }

  /* ───────────  TOPBAR  ─────────── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--line-2);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
    gap: 16px;
  }
  .topbar .left, .topbar .right {
    display: flex; align-items: center;
    flex: 1;
    gap: 18px;
  }
  .topbar .right { justify-content: flex-end; gap: 12px; }
  .topbar .center {
    flex: 2;
    display: flex; justify-content: center;
  }
  .topbar .logo {
    font-family: var(--display);
    font-weight: 600;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .topbar .logo span { color: var(--red); }
  .topbar a.back {
    color: var(--dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    transition: color .15s;
  }
  .topbar a.back:hover { color: var(--ink); }
  .topbar .stagename {
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    padding: 6px 14px;
    outline: none;
    min-width: 260px;
    transition: border-color .15s;
  }
  .topbar .stagename:hover { border-color: var(--line-2); }
  .topbar .stagename:focus { border-color: var(--ink); }
  .topbar .export {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 10px 22px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s;
  }
  .topbar .export:hover { background: var(--red-deep); }

  .export-result {
    display: none;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .export-result.show { display: flex; }
  .export-result .filename { color: var(--red); }
  .export-result .sep { color: var(--dim-2); }
  .export-result input {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    outline: none;
    width: 180px;
  }
  .export-result input:focus { border-color: var(--ink); }
  .export-result .send {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .export-result .send:hover { background: rgba(235,229,210,0.85); }
  .export-result .done { color: var(--green); }

  /* ───────────  LAYOUT  ─────────── */
  .layout {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    display: flex;
  }
  .sidebar {
    width: 240px;
    background: #0d0d12;
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h3 {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .sidebar .separator {
    height: 1px;
    background: var(--line);
    margin: 18px 0;
  }

  /* tools */
  .tool {
    display: block;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 12px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background .15s, color .15s, border-color .15s;
  }
  .tool:hover { background: rgba(255,255,255,0.04); }
  .tool.active {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }
  .tool-help {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 4px 8px;
    line-height: 1.4;
  }

  /* fields */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field input, .field textarea {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 6px 0;
    width: 100%;
    outline: none;
    resize: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-bottom-color: var(--ink); }
  .field textarea { min-height: 48px; line-height: 1.4; }

  /* targets list */
  .targets-list { list-style: none; padding: 0; margin: 0; }
  .targets-list li {
    display: grid;
    grid-template-columns: 28px 1fr 50px;
    gap: 6px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 10px;
  }
  .targets-list li:last-child { border-bottom: none; }
  .targets-list li .id { color: var(--red); font-weight: 600; letter-spacing: 0.06em; }
  .targets-list li .type { color: var(--ink); font-size: 9px; letter-spacing: 0.1em; }
  .targets-list li input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    text-align: center;
    padding: 4px;
    outline: none;
  }
  .targets-list li input:focus { border-color: var(--ink); }
  .targets-list .empty {
    color: var(--dim-2);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    grid-template-columns: 1fr;
    border-bottom: none;
    padding: 10px 0;
  }

  .clear-all {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    margin-top: 18px;
    transition: color .15s, border-color .15s;
  }
  .clear-all:hover {
    color: var(--red);
    border-color: var(--red);
  }

  /* canvas */
  .canvas-host {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a0c;
  }
  .canvas-host canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .canvas-meta {
    position: absolute;
    bottom: 12px; left: 16px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim-2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
  }
  .canvas-meta.tr {
    bottom: auto; top: 12px; left: auto; right: 16px;
  }

  /* ───────────  SCALE RULER  ─────────── */
  .scale-ruler {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.18em;
    pointer-events: none;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .scale-ruler .label { text-transform: uppercase; }
  .scale-ruler .bar {
    width: 100px;
    height: 2px;
    background: #fff;
    position: relative;
  }
  .scale-ruler .bar::before,
  .scale-ruler .bar::after {
    content: '';
    position: absolute;
    width: 1px;
    height: 8px;
    background: #fff;
    top: -3px;
  }
  .scale-ruler .bar::before { left: 0; }
  .scale-ruler .bar::after { right: 0; }

  /* ───────────  HISTORY BUTTONS  ─────────── */
  .history-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .history-btn:hover { background: rgba(255,255,255,0.04); border-color: var(--ink); }
  .history-btn.disabled {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ───────────  FILE MENU  ─────────── */
  .file-menu-wrap { position: relative; display: inline-flex; }
  .file-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #0d0d12;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 180px;
    display: none;
    z-index: 11;
  }
  .file-menu.open { display: block; }
  .file-menu-item {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px;
    cursor: pointer;
  }
  .file-menu-item:hover { background: rgba(255,255,255,0.06); }
  .file-menu-item + .file-menu-item { border-top: 1px solid rgba(255,255,255,0.05); }

  /* ───────────  TEMPLATES MODAL  ─────────── */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal.open { display: flex; }
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
  }
  .modal-panel {
    position: relative;
    background: #0d0d12;
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: calc(100% - 40px);
    max-width: 800px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    padding: 28px 32px 32px;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: none;
    color: var(--dim);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-title {
    font-family: var(--display);
    font-weight: 500;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .modal-subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .templates-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .template-card {
    background: #131318;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 7px;
    text-align: left;
    font-family: var(--sans);
    transition: border-color 0.15s;
    min-height: 140px;
  }
  .template-card:hover { border-color: var(--red); }
  .template-card .t-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .template-card .t-badge {
    display: inline-block;
    align-self: flex-start;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.18em;
    padding: 2px 6px;
    border: 1px solid currentColor;
    text-transform: uppercase;
  }
  .template-card .t-badge.speed,
  .template-card .t-badge.short  { color: var(--green); }
  .template-card .t-badge.medium,
  .template-card .t-badge.long   { color: var(--amber); }
  .template-card .t-stats {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  .template-card .t-desc {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--dim);
    line-height: 1.4;
    flex: 1;
  }
  .template-card.empty {
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.2);
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .template-card.empty .t-name { color: var(--dim); }
  .template-card.empty:hover { border-color: var(--ink); }
  .template-card.empty:hover .t-name { color: var(--ink); }

  /* ───────────  SNAP TOGGLE  ─────────── */
  .snap-toggle {
    background: var(--red);
    color: #fff;
    border: 1px solid var(--red);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .snap-toggle.off {
    background: transparent;
    color: var(--dim);
    border-color: var(--line-2);
  }
  .snap-toggle.off:hover { color: var(--ink); border-color: var(--ink); }

  /* ───────────  COORD TOOLTIP  ─────────── */
  .coord-tip {
    position: fixed;
    background: #0d0d12;
    border: 1px solid var(--red);
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink);
    letter-spacing: 0.06em;
    pointer-events: none;
    z-index: 20;
    display: none;
    white-space: nowrap;
    line-height: 1.5;
  }
  .coord-tip.show { display: block; }
  .coord-tip.warn { border-color: #ffaa00; }
  .coord-tip .warn-line { color: #ffaa00; font-weight: 600; }

  /* ───────────  SHOTS SUMMARY  ─────────── */
  .shots-summary {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .shots-summary .label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .shots-count {
    font-family: var(--display);
    font-weight: 500;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .shots-class {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid currentColor;
    background: transparent;
    margin-bottom: 8px;
    color: var(--dim);
  }
  .shots-points {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ───────────  HORS LIMITES BADGE  ─────────── */
  .hors-limites {
    display: none;
    background: var(--red);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 12px;
    animation: blink 1s infinite;
    white-space: nowrap;
    align-items: center;
  }
  .hors-limites.show { display: inline-flex; }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.3; }
  }

  /* ───────────  VALIDATION PANEL  ─────────── */
  .validation-panel {
    display: none;
    margin-bottom: 18px;
  }
  .validation-panel.show { display: block; }
  .validation-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .validation-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--ink);
    padding: 5px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    line-height: 1.4;
    background: transparent;
    transition: background .15s;
  }
  .validation-row:last-child { border-bottom: none; }
  .validation-row .icon { flex: 0 0 auto; font-weight: 600; }
  .validation-row.warn .icon { color: #ffaa00; }
  .validation-row.ok   .icon { color: #5ad99b; }
  .validation-row.clickable { cursor: pointer; }
  .validation-row.clickable:hover { background: rgba(255, 170, 0, 0.08); }

  /* ───────────  HF MAX  ─────────── */
  .hf-max {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ───────────  PROPS PANEL  ─────────── */
  .props-panel {
    display: none;
    background: #0a0a0c;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding: 12px;
    margin-top: 16px;
  }
  .props-panel.show { display: block; }
  .props-panel .props-head {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .props-panel .props-row {
    margin-bottom: 10px;
  }
  .props-panel .props-row label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .props-panel .props-row label .val {
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .props-panel input[type=range] {
    width: 100%;
    accent-color: var(--red);
    cursor: pointer;
  }
  .props-panel input[type=number] {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 8px;
    width: 100%;
    outline: none;
  }
  .props-panel input[type=number]:focus { border-color: var(--ink); }
  .props-panel .props-delete {
    width: 100%;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 9px;
    cursor: pointer;
    margin-top: 8px;
    transition: background .15s, color .15s;
  }
  .props-panel .props-delete:hover {
    background: var(--red);
    color: #fff;
  }

  /* ───────────  IO BANNER  ─────────── */
  .io-banner {
    position: fixed;
    top: 48px;
    left: 0; right: 0;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line-2);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink);
    letter-spacing: 0.14em;
    text-transform: uppercase;

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvasHost = document.getElementById('canvasHost');

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0a0c');

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 22, 16);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
canvasHost.appendChild(renderer.domElement);

function resize() {
  const w = canvasHost.clientWidth;
  const h = canvasHost.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

const controls = new OrbitControls(camera, renderer.domElement);
controls.minPolarAngle = Math.PI / 6;
controls.maxPolarAngle = Math.PI / 2.4;
controls.minDistance = 5;
controls.maxDistance = 35;
controls.enablePan = true;
controls.target.set(0, 0, 0);
controls.update();

/* ──────────────  LIGHTS  ────────────── */
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(10, 20, 10);
dir.castShadow = true;
dir.shadow.camera.near = 0.1;
dir.shadow.camera.far = 50;
dir.shadow.camera.left = -20;
dir.shadow.camera.right = 20;
dir.shadow.camera.top = 20;
dir.shadow.camera.bottom = -20;
dir.shadow.mapSize.set(1024, 1024);
scene.add(dir);

/* ──────────────  FLOOR + GRID  ────────────── */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 20),
  new THREE.MeshLambertMaterial({ color: 0x0f0f14 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const gridLines = [];
for (let x = -15; x <= 15; x++) gridLines.push(x, 0.001, -10, x, 0.001, 10);
for (let z = -10; z <= 10; z++) gridLines.push(-15, 0.001, z, 15, 0.001, z);
const gridGeo = new THREE.BufferGeometry();
gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridLines, 3));
const grid = new THREE.LineSegments(
  gridGeo,
  new THREE.LineBasicMaterial({ color: 0x1e1e28 })
);
scene.add(grid);

/* invisible raycast plane (avoids hitting the visible floor mesh) */
const rcPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshBasicMaterial({ visible: false })
);
rcPlane.rotation.x = -Math.PI / 2;
scene.add(rcPlane);

/* ──────────────  STATE  ────────────── */
const TOOL_HELP = {
  paper:     'CLIC SUR LE SOL POUR PLACER',
  popper:    'CLIC SUR LE SOL POUR PLACER',
  plate:     'CLIC SUR LE SOL POUR PLACER',
  noshoot:   'CLIC SUR LE SOL POUR PLACER',
  hardcover: 'CLIC SUR LE SOL POUR PLACER',
  port:      'CLIC DÉPART → CLIC ARRIVÉE (COMME UN MUR)',
  barrel:    'CLIC SUR LE SOL POUR PLACER',
  wall:      'CLIC POINT A · CLIC POINT B',
  box:       'CLIC POUR POSER LA BOX',
  arrow:     'CLIC DÉPART → CLIC ARRIVÉE',
  select:    'CLIC POUR SÉLECTIONNER · GLISSE POUR DÉPLACER',
};
const TYPE_LABEL = {
  paper: 'PAPIER', popper: 'POPPER', plate: 'PLATE', noshoot: 'NO-SHOOT'
};
const TARGET_TYPES = ['paper', 'popper', 'plate', 'noshoot'];
const DEFAULT_HITS = { paper: 2, popper: 1, plate: 1, noshoot: 0 };

let tool = 'paper';
const items = []; // { type, mesh, requiredHits?, label? }
let selected = null;
let dragging = false;
const dragOffset = new THREE.Vector3();
let wallStart = null;
let wallMarker = null;
let arrowStart = null;
let arrowMarker = null;
let portStart = null;
let portMarker = null;

/* ──────────────  SNAP  ────────────── */
let snapEnabled = true;
const snapBtn = document.getElementById('snapToggle');
function updateSnapBtn() { snapBtn.classList.toggle('off', !snapEnabled); }
snapBtn.addEventListener('click', () => { snapEnabled = !snapEnabled; updateSnapBtn(); });
updateSnapBtn();
function snap(v) { return snapEnabled ? Math.round(v * 2) / 2 : v; }

/* ──────────────  BUILDERS  ────────────── */
function makeLabel(text) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 64;
  const cx = c.getContext('2d');

  const pad = 8;
  const r = 6;
  const x0 = pad, y0 = pad;
  const x1 = 128 - pad, y1 = 64 - pad;
  cx.fillStyle = '#e84a3a';
  cx.beginPath();
  cx.moveTo(x0 + r, y0);
  cx.lineTo(x1 - r, y0);
  cx.quadraticCurveTo(x1, y0, x1, y0 + r);
  cx.lineTo(x1, y1 - r);
  cx.quadraticCurveTo(x1, y1, x1 - r, y1);
  cx.lineTo(x0 + r, y1);
  cx.quadraticCurveTo(x0, y1, x0, y1 - r);
  cx.lineTo(x0, y0 + r);
  cx.quadraticCurveTo(x0, y0, x0 + r, y0);
  cx.closePath();
  cx.fill();

  cx.fillStyle = '#ffffff';
  cx.font = 'bold 20px "JetBrains Mono", ui-monospace, monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 64, 32);

  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(1.2, 0.6, 1);
  sprite.renderOrder = 999;
  return sprite;
}

function makePaper() {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.4, 0.04),
    new THREE.MeshLambertMaterial({ color: 0xc8a46e })
  );
  body.position.y = 0.7;
  body.castShadow = true;
  grp.add(body);

  const zoneC = new THREE.Mesh(
    new THREE.BoxGeometry(0.38, 0.9, 0.01),
    new THREE.MeshLambertMaterial({ color: 0xbc9660 })
  );
  zoneC.position.z = 0.02;
  body.add(zoneC);

  const zoneA = new THREE.Mesh(
    new THREE.BoxGeometry(0.22, 0.55, 0.01),
    new THREE.MeshLambertMaterial({ color: 0xd4b07a })
  );
  zoneA.position.z = 0.025;
  body.add(zoneA);

  grp.userData.height = 1.4;
  return grp;
}

function makePopper() {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.28, 1.1, 8),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
  );
  body.position.y = 0.55;
  body.castShadow = true;
  grp.add(body);
  grp.userData.height = 1.1;
  return grp;
}

function makePlate() {
  const grp = new THREE.Group();
  const post = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 0.9, 8),
    new THREE.MeshLambertMaterial({ color: 0x666666 })
  );
  post.position.y = 0.45;
  post.castShadow = true;
  grp.add(post);

  const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(0.32, 0.32, 0.06, 16),
    new THREE.MeshLambertMaterial({ color: 0xaaaaaa })
  );
  plate.position.y = 0.9;
  plate.castShadow = true;
  grp.add(plate);

  grp.userData.height = 0.96;
  return grp;
}

function makeNoShoot() {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.4, 0.04),
    new THREE.MeshLambertMaterial({ color: 0xe8e8e8 })
  );
  body.position.y = 0.7;
  body.castShadow = true;
  grp.add(body);

  const crossMat = new THREE.MeshLambertMaterial({ color: 0xe84a3a, transparent: true, opacity: 0.5 });
  const c1 = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.06, 0.005), crossMat);
  c1.rotation.z = Math.PI / 4;
  c1.position.z = 0.025;
  body.add(c1);

  const c2 = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.06, 0.005), crossMat);
  c2.rotation.z = -Math.PI / 4;
  c2.position.z = 0.025;
  body.add(c2);

  grp.userData.height = 1.4;
  return grp;
}

function makeWall(ax, az, bx, bz) {
  const dx = bx - ax;
  const dz = bz - az;
  const length = Math.hypot(dx, dz);
  if (length < 0.05) return null;
  const angle = Math.atan2(dz, dx);

  const grp = new THREE.Group();
  const wallGeo = new THREE.BoxGeometry(length, 1.2, 0.15);
  const wall = new THREE.Mesh(
    wallGeo,
    new THREE.MeshLambertMaterial({ color: 0x4a4a5a })
  );
  wall.position.y = 0.6;
  wall.castShadow = true;
  wall.receiveShadow = true;
  grp.add(wall);

  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(wallGeo),
    new THREE.LineBasicMaterial({ color: 0x8888aa })
  );
  edges.position.y = 0.6;
  grp.add(edges);

  grp.position.set((ax + bx) / 2, 0, (az + bz) / 2);
  grp.rotation.y = -angle;
  grp.userData.length = length;
  return grp;
}

function makeStartBox() {
  const grp = new THREE.Group();
  const w = 1.5, d = 1.0;
  const pts = [
    new THREE.Vector3(-w/2, 0.02, -d/2),
    new THREE.Vector3( w/2, 0.02, -d/2),
    new THREE.Vector3( w/2, 0.02,  d/2),
    new THREE.Vector3(-w/2, 0.02,  d/2),
    new THREE.Vector3(-w/2, 0.02, -d/2),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xe84a3a }));
  grp.add(line);

  // a transparent flat box for raycast picking
  const pick = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.04, d),
    new THREE.MeshBasicMaterial({ color: 0xe84a3a, transparent: true, opacity: 0 })
  );
  pick.position.y = 0.02;
  grp.add(pick);

  const c = document.createElement('canvas');
  c.width = 128; c.height = 32;
  const cx = c.getContext('2d');
  cx.clearRect(0, 0, 128, 32);
  cx.fillStyle = '#ffffff';
  cx.font = 'bold 18px "JetBrains Mono", ui-monospace, monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText('START', 64, 16);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(0.9, 0.22, 1);
  sprite.position.y = 0.4;
  sprite.renderOrder = 999;
  grp.add(sprite);

  return grp;
}

function makeArrowNumber(n) {
  const c = document.createElement('canvas');
  c.width = 48; c.height = 48;
  const cx = c.getContext('2d');
  cx.fillStyle = '#5ad99b';
  cx.beginPath();
  cx.arc(24, 24, 22, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = '#ffffff';
  cx.font = 'bold 22px "JetBrains Mono", ui-monospace, monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(String(n), 24, 24);
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(0.5, 0.5, 1);
  sprite.renderOrder = 999;
  return sprite;
}

function makeArrow(ax, az, bx, bz) {
  const dx = bx - ax;
  const dz = bz - az;
  const length = Math.hypot(dx, dz);
  if (length < 0.05) return null;
  const angle = Math.atan2(dz, dx);

  const grp = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, length, 8),
    new THREE.MeshLambertMaterial({ color: 0x5ad99b })
  );
  body.rotation.z = Math.PI / 2; // lay along local +X
  body.position.set(0, 0.05, 0);
  grp.add(body);

  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.15, 0.35, 8),
    new THREE.MeshLambertMaterial({ color: 0x5ad99b })
  );
  head.rotation.z = -Math.PI / 2; // tip points along local +X
  head.position.set(length / 2, 0.05, 0);
  grp.add(head);

  grp.position.set((ax + bx) / 2, 0, (az + bz) / 2);
  grp.rotation.y = -angle;
  grp.userData.type = 'arrow';
  grp.userData.length = length;
  return grp;
}

function makePropLabel(text) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 64;
  const cx = c.getContext('2d');
  const pad = 8, r = 6;
  const x0 = pad, y0 = pad, x1 = 128 - pad, y1 = 64 - pad;
  cx.fillStyle = '#3a3a45';
  cx.beginPath();
  cx.moveTo(x0 + r, y0);
  cx.lineTo(x1 - r, y0);
  cx.quadraticCurveTo(x1, y0, x1, y0 + r);
  cx.lineTo(x1, y1 - r);
  cx.quadraticCurveTo(x1, y1, x1 - r, y1);
  cx.lineTo(x0 + r, y1);
  cx.quadraticCurveTo(x0, y1, x0, y1 - r);
  cx.lineTo(x0, y0 + r);
  cx.quadraticCurveTo(x0, y0, x0 + r, y0);
  cx.closePath();
  cx.fill();
  cx.fillStyle = '#ebe5d2';
  cx.font = 'bold 16px "JetBrains Mono", ui-monospace, monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 64, 32);
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sprite.scale.set(1.0, 0.5, 1);
  sprite.renderOrder = 999;
  return sprite;
}

function makeHardCover() {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.4, 0.04),
    new THREE.MeshLambertMaterial({ color: 0x1a1a2e })
  );
  body.position.y = 0.7;
  body.castShadow = true;
  grp.add(body);

  const stripeMat = new THREE.MeshLambertMaterial({ color: 0x3a3aff, transparent: true, opacity: 0.8 });
  const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 1.5, 0.05), stripeMat);
  s1.rotation.z = Math.PI / 4;
  s1.position.z = 0.025;
  body.add(s1);

  const s2 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 1.5, 0.05), stripeMat);
  s2.rotation.z = -Math.PI / 4;
  s2.position.z = 0.025;
  body.add(s2);

  grp.userData.height = 1.4;
  return grp;
}

function makeBarrel() {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 0.8, 12),
    new THREE.MeshLambertMaterial({ color: 0x5a3a1a })
  );
  body.position.y = 0.4;
  body.castShadow = true;
  grp.add(body);

  const hoopMat = new THREE.MeshLambertMaterial({ color: 0x8a6a3a });
  [0.1, 0.4, 0.7].forEach((hy) => {
    const hoop = new THREE.Mesh(new THREE.TorusGeometry(0.31, 0.03, 6, 12), hoopMat);
    hoop.rotation.x = Math.PI / 2;
    hoop.position.y = hy;
    grp.add(hoop);
  });

  grp.userData.height = 0.8;
  return grp;
}

function makePort(ax, az, bx, bz) {
  const dx = bx - ax;
  const dz = bz - az;
  const length = Math.hypot(dx, dz);
  if (length < 0.5) return null;
  const angle = Math.atan2(dz, dx);

  const grp = new THREE.Group();
  const segL = length * 0.4;
  const gap  = length * 0.2;

  const wallMat = new THREE.MeshLambertMaterial({ color: 0x4a4a5a });
  const segGeo  = new THREE.BoxGeometry(segL, 1.2, 0.15);

  const leftWall = new THREE.Mesh(segGeo, wallMat);
  leftWall.position.set(-length / 2 + segL / 2, 0.6, 0);
  leftWall.castShadow = true;
  leftWall.receiveShadow = true;
  grp.add(leftWall);

  const rightWall = new THREE.Mesh(segGeo, wallMat);
  rightWall.position.set(length / 2 - segL / 2, 0.6, 0);
  rightWall.castShadow = true;
  rightWall.receiveShadow = true;
  grp.add(rightWall);

  const edgeMat = new THREE.LineBasicMaterial({ color: 0x8888aa });
  const leftEdges = new THREE.LineSegments(new THREE.EdgesGeometry(segGeo), edgeMat);
  leftEdges.position.copy(leftWall.position);
  grp.add(leftEdges);
  const rightEdges = new THREE.LineSegments(new THREE.EdgesGeometry(segGeo), edgeMat);
  rightEdges.position.copy(rightWall.position);
  grp.add(rightEdges);

  // Lintel above the gap
  const lintel = new THREE.Mesh(
    new THREE.BoxGeometry(gap, 0.15, 0.15),
    new THREE.MeshLambertMaterial({ color: 0x2a2a35 })
  );
  lintel.position.set(0, 1.2 - 0.075, 0);
  lintel.castShadow = true;
  grp.add(lintel);

  grp.position.set((ax + bx) / 2, 0, (az + bz) / 2);
  grp.rotation.y = -angle;
  grp.userData.length = length;
  return grp;
}

/* ──────────────  PLACEMENT / SELECTION / DELETE  ────────────── */
function placeTarget(type, x, z) {
  let mesh;
  if (type === 'paper')        mesh = makePaper();
  else if (type === 'popper')  mesh = makePopper();
  else if (type === 'plate')   mesh = makePlate();
  else if (type === 'noshoot') mesh = makeNoShoot();
  else return null;
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  const item = { type, mesh, requiredHits: DEFAULT_HITS[type] ?? 1, label: null };
  items.push(item);
  refreshLabels();
  return item;
}

function refreshLabels() {
  let nT = 0, nHC = 0;
  items.forEach(it => {
    if (TARGET_TYPES.includes(it.type)) {
      nT++;
      if (it.label) it.mesh.remove(it.label);
      const lbl = makeLabel('T' + nT);
      const h = it.mesh.userData.height || 1.2;
      lbl.position.set(0, h + 0.3, 0);
      it.mesh.add(lbl);
      it.label = lbl;
    } else if (it.type === 'hardcover') {
      nHC++;
      if (it.label) it.mesh.remove(it.label);
      const lbl = makeLabel('HC' + nHC);
      const h = it.mesh.userData.height || 1.2;
      lbl.position.set(0, h + 0.3, 0);
      it.mesh.add(lbl);
      it.label = lbl;
    } else if (it.type === 'barrel') {
      if (it.label) it.mesh.remove(it.label);
      const lbl = makePropLabel('PROP');
      const h = it.mesh.userData.height || 0.8;
      lbl.position.set(0, h + 0.3, 0);
      it.mesh.add(lbl);
      it.label = lbl;
    } else if (it.type === 'port') {
      if (it.label) it.mesh.remove(it.label);
      const lbl = makePropLabel('PORT');
      lbl.position.set(0, 1.6, 0);
      it.mesh.add(lbl);
      it.label = lbl;
    }
  });
  updateTargetsList();
}

function refreshArrowNumbers() {
  let n = 0;
  items.forEach(it => {
    if (it.type !== 'arrow') return;
    n++;
    if (it.label) it.mesh.remove(it.label);
    const sprite = makeArrowNumber(n);
    sprite.position.set(0, 0.4, 0);
    it.mesh.add(sprite);
    it.label = sprite;
  });
}

function updateEmissive(item) {
  if (!item || !item.mesh) return;
  let color = 0x000000, intensity = 0;
  if (item.errorHighlight) {
    color = 0xff4400; intensity = 0.3;
  } else if (selected === item) {
    color = 0xe84a3a; intensity = 0.3;
  }
  item.mesh.traverse(o => {
    if (o.isMesh && o.material && 'emissive' in o.material) {
      o.material.emissive.setHex(color);
      o.material.emissiveIntensity = intensity;
    }
  });
}

/* ──────────────  PROPS PANEL  ────────────── */
const propsPanel = document.getElementById('propsPanel');

function rotDeg(item) {
  return Math.round(((item.mesh.rotation.y * 180 / Math.PI) % 360 + 360) % 360);
}

function showProps(item) {
  if (!item) {
    propsPanel.classList.remove('show');
    propsPanel.innerHTML = '';
    return;
  }
  const TYPE_DISPLAY = {
    paper: 'PAPIER', popper: 'POPPER', plate: 'PLATE', noshoot: 'NO-SHOOT',
    hardcover: 'HARD COVER', wall: 'MUR', port: 'PORT', barrel: 'TONNEAU',
    arrow: 'FLÈCHE', startbox: 'BOX DE DÉPART',
  };
  const typeLabel = TYPE_DISPLAY[item.type] || item.type.toUpperCase();
  const rows = [];

  if (TARGET_TYPES.includes(item.type) || item.type === 'hardcover') {
    rows.push(`
      <div class="props-row" data-prop="rotation">
        <label>Rotation <span class="val">${rotDeg(item)}°</span></label>
        <input type="range" min="0" max="360" step="1" value="${rotDeg(item)}">
      </div>`);
    if (TARGET_TYPES.includes(item.type)) {
      rows.push(`
        <div class="props-row" data-prop="hits">
          <label>Coups requis <span class="val">${item.requiredHits}</span></label>
          <input type="number" min="0" max="20" value="${item.requiredHits}">
        </div>`);
    }
  } else if (item.type === 'wall' || item.type === 'port') {
    const h = (item.mesh.scale.y * 1.2);
    const t = (item.mesh.scale.z * 0.15);
    rows.push(`
      <div class="props-row" data-prop="height">
        <label>Hauteur (m) <span class="val">${h.toFixed(2)}</span></label>
        <input type="range" min="0.5" max="3.0" step="0.1" value="${h.toFixed(2)}">
      </div>
      <div class="props-row" data-prop="thickness">
        <label>Épaisseur (m) <span class="val">${t.toFixed(2)}</span></label>
        <input type="range" min="0.1" max="0.5" step="0.05" value="${t.toFixed(2)}">
      </div>`);
  } else if (item.type === 'barrel') {
    rows.push(`
      <div class="props-row" data-prop="rotation">
        <label>Rotation <span class="val">${rotDeg(item)}°</span></label>
        <input type="range" min="0" max="360" step="1" value="${rotDeg(item)}">
      </div>`);
  }

  propsPanel.innerHTML =
    `<div class="props-head">Propriétés — ${typeLabel}</div>` +
    rows.join('') +
    `<button class="props-delete" id="propsDeleteBtn">Supprimer</button>`;
  propsPanel.classList.add('show');

  const rotInput = propsPanel.querySelector('[data-prop="rotation"] input');
  if (rotInput) {
    rotInput.addEventListener('input', (e) => {
      const deg = parseFloat(e.target.value);
      item.mesh.rotation.y = deg * Math.PI / 180;
      const valEl = propsPanel.querySelector('[data-prop="rotation"] .val');
      if (valEl) valEl.textContent = Math.round(deg) + '°';
    });
  }
  const hitsInput = propsPanel.querySelector('[data-prop="hits"] input');
  if (hitsInput) {
    hitsInput.addEventListener('input', (e) => {
      const v = parseInt(e.target.value, 10);
      item.requiredHits = isNaN(v) ? 0 : Math.max(0, Math.min(20, v));
      const valEl = propsPanel.querySelector('[data-prop="hits"] .val');
      if (valEl) valEl.textContent = item.requiredHits;
      updateTargetsList();
    });
  }
  const heightInput = propsPanel.querySelector('[data-prop="height"] input');
  if (heightInput) {
    heightInput.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      item.mesh.scale.y = v / 1.2;
      const valEl = propsPanel.querySelector('[data-prop="height"] .val');
      if (valEl) valEl.textContent = v.toFixed(2);
    });
  }
  const thickInput = propsPanel.querySelector('[data-prop="thickness"] input');
  if (thickInput) {
    thickInput.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      item.mesh.scale.z = v / 0.15;
      const valEl = propsPanel.querySelector('[data-prop="thickness"] .val');
      if (valEl) valEl.textContent = v.toFixed(2);
    });
  }
  const delBtn = propsPanel.querySelector('#propsDeleteBtn');
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      pushUndo();
      deleteItem(item);
    });
  }
}

function syncRotationSlider() {
  if (!selected) return;
  const rotInput = propsPanel.querySelector('[data-prop="rotation"] input');
  const valEl = propsPanel.querySelector('[data-prop="rotation"] .val');
  if (!rotInput || !valEl) return;
  const deg = rotDeg(selected);
  rotInput.value = deg;
  valEl.textContent = deg + '°';
}

function selectItem(item) {
  if (selected === item) return;
  const oldSelected = selected;
  selected = item;
  if (oldSelected) updateEmissive(oldSelected);
  if (item) updateEmissive(item);
  showProps(item);
}

function deleteItem(item) {
  if (!item) return;
  if (selected === item) selectItem(null);
  scene.remove(item.mesh);
  const i = items.indexOf(item);
  if (i >= 0) items.splice(i, 1);
  refreshLabels();
  refreshArrowNumbers();
  updateTargetsList();
}

/* ──────────────  RAYCAST  ────────────── */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function setMouseFromEvent(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
}

function getGroundPoint() {
  raycaster.setFromCamera(mouse, camera);
  const ints = raycaster.intersectObject(rcPlane);
  return ints.length ? ints[0].point : null;
}

function pickItem() {
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  items.forEach(it => {
    it.mesh.traverse(o => {
      if (o.isMesh) meshes.push(o);
    });
  });
  const ints = raycaster.intersectObjects(meshes, false);
  if (ints.length === 0) return null;
  let obj = ints[0].object;
  while (obj.parent && obj.parent !== scene) obj = obj.parent;
  return items.find(it => it.mesh === obj) || null;
}

/* ──────────────  POINTER HANDLERS  ────────────── */
let downPos = null;
let downTime = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  setMouseFromEvent(e);
  downPos = { x: e.clientX, y: e.clientY };
  downTime = performance.now();
  preDragSnapshot = null;
  preDragPos = null;

  if (tool === 'select') {
    const hit = pickItem();
    if (hit) {
      selectItem(hit);
      dragging = true;
      const gp = getGroundPoint();
      if (gp) dragOffset.copy(hit.mesh.position).sub(gp);
      controls.enabled = false;
      preDragSnapshot = captureState();
      preDragPos = { x: hit.mesh.position.x, z: hit.mesh.position.z };
    } else {
      selectItem(null);
    }
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  setMouseFromEvent(e);
  if (selected) {
    const gp = getGroundPoint();
    if (gp) {
      const nx = snap(gp.x + dragOffset.x);
      const nz = snap(gp.z + dragOffset.z);
      selected.mesh.position.set(nx, selected.mesh.position.y, nz);
    }
  }
});

function endDrag() {
  if (dragging) {
    dragging = false;
    controls.enabled = true;
  }
}
renderer.domElement.addEventListener('pointerup', (e) => {
  if (e.button !== 0) return;
  const wasDrag = dragging;
  const moved = downPos && (Math.abs(e.clientX - downPos.x) > 3 || Math.abs(e.clientY - downPos.y) > 3);
  endDrag();
  if (wasDrag) {
    if (preDragSnapshot && preDragPos && selected) {
      const mvd = Math.abs(selected.mesh.position.x - preDragPos.x) > 1e-4 ||
                  Math.abs(selected.mesh.position.z - preDragPos.z) > 1e-4;
      if (mvd) {
        undoStack.push(preDragSnapshot);
        if (undoStack.length > UNDO_LIMIT) undoStack.shift();
        redoStack.length = 0;
        updateUndoRedoButtons();
        runValidation();
      }
    }
    preDragSnapshot = null;
    preDragPos = null;
    downPos = null;
    return;
  }
  if (moved) { downPos = null; return; } // OrbitControls rotation/pan
  downPos = null;
  setMouseFromEvent(e);

  if (tool === 'select') return;

  if (TARGET_TYPES.includes(tool)) {
    const gp = getGroundPoint();
    if (gp) {
      pushUndo();
      placeTarget(tool, snap(gp.x), snap(gp.z));
    }
  } else if (tool === 'hardcover') {
    const gp = getGroundPoint();
    if (!gp) return;
    pushUndo();
    const mesh = makeHardCover();
    mesh.position.set(snap(gp.x), 0, snap(gp.z));
    scene.add(mesh);
    items.push({ type: 'hardcover', mesh, label: null });
    refreshLabels();
  } else if (tool === 'barrel') {
    const gp = getGroundPoint();
    if (!gp) return;
    pushUndo();
    const mesh = makeBarrel();
    mesh.position.set(snap(gp.x), 0, snap(gp.z));
    scene.add(mesh);
    items.push({ type: 'barrel', mesh, label: null });
    refreshLabels();
  } else if (tool === 'port') {
    const gp = getGroundPoint();
    if (!gp) return;
    const sx = snap(gp.x), sz = snap(gp.z);
    if (!portStart) {
      portStart = { x: sx, z: sz };
      portMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0x8888aa })
      );
      portMarker.position.set(sx, 0.1, sz);
      scene.add(portMarker);
    } else {
      pushUndo();
      const port = makePort(portStart.x, portStart.z, sx, sz);
      if (port) {
        scene.add(port);
        items.push({ type: 'port', mesh: port, label: null });
        refreshLabels();
      }
      scene.remove(portMarker);
      portMarker = null;
      portStart = null;
    }
  } else if (tool === 'wall') {
    const gp = getGroundPoint();
    if (!gp) return;
    const sx = snap(gp.x), sz = snap(gp.z);
    if (!wallStart) {
      wallStart = { x: sx, z: sz };
      wallMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0xe84a3a })
      );
      wallMarker.position.set(sx, 0.1, sz);
      scene.add(wallMarker);
    } else {
      pushUndo();
      const wall = makeWall(wallStart.x, wallStart.z, sx, sz);
      if (wall) {
        scene.add(wall);
        items.push({ type: 'wall', mesh: wall });
      }
      scene.remove(wallMarker);
      wallMarker = null;
      wallStart = null;
      updateTargetsList();
    }
  } else if (tool === 'box') {
    const gp = getGroundPoint();
    if (!gp) return;
    pushUndo();
    for (let i = items.length - 1; i >= 0; i--) {
      if (items[i].type === 'startbox') {
        scene.remove(items[i].mesh);
        items.splice(i, 1);
      }
    }
    const box = makeStartBox();
    box.position.set(snap(gp.x), 0, snap(gp.z));
    scene.add(box);
    items.push({ type: 'startbox', mesh: box });
    updateTargetsList();
  } else if (tool === 'arrow') {
    const gp = getGroundPoint();
    if (!gp) return;
    const sx = snap(gp.x), sz = snap(gp.z);
    if (!arrowStart) {
      arrowStart = { x: sx, z: sz };
      arrowMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0x5ad99b })
      );
      arrowMarker.position.set(sx, 0.1, sz);
      scene.add(arrowMarker);
    } else {
      pushUndo();
      const arrow = makeArrow(arrowStart.x, arrowStart.z, sx, sz);
      if (arrow) {
        scene.add(arrow);
        items.push({ type: 'arrow', mesh: arrow, label: null });
        refreshArrowNumbers();
      }
      scene.remove(arrowMarker);
      arrowMarker = null;
      arrowStart = null;
    }
  }
});
renderer.domElement.addEventListener('pointerleave', endDrag);

/* ──────────────  KEYBOARD  ────────────── */
window.addEventListener('keydown', (e) => {
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return;
  const mod = e.ctrlKey || e.metaKey;
  const key = e.key.toLowerCase();

  if (mod && key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  } else if (mod && (key === 'y' || (key === 'z' && e.shiftKey))) {
    e.preventDefault();
    redo();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selected) {
      e.preventDefault();
      pushUndo();
      deleteItem(selected);
    }
  } else if (key === 'r' && selected) {
    const t = selected.type;
    if (TARGET_TYPES.includes(t) || t === 'hardcover' || t === 'barrel') {
      e.preventDefault();
      const delta = e.shiftKey ? -15 : 15;
      selected.mesh.rotation.y += delta * Math.PI / 180;
      syncRotationSlider();
    }
  } else if (e.key === 'Escape') {
    if (wallMarker) { scene.remove(wallMarker); wallMarker = null; }
    wallStart = null;
    if (arrowMarker) { scene.remove(arrowMarker); arrowMarker = null; }
    arrowStart = null;
    if (portMarker) { scene.remove(portMarker); portMarker = null; }
    portStart = null;
    selectItem(null);
  }
});

/* ──────────────  TARGETS LIST  ────────────── */
const targetsList = document.getElementById('targetsList');
function updateTargetsList() {
  const targets = items.filter(it => TARGET_TYPES.includes(it.type));
  targetsList.innerHTML = '';
  if (targets.length === 0) {

    `;
