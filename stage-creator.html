/* ──────────────  METRICS (shots / class / points / HF / warn)  ────────────── */
const shotsCountEl = document.getElementById('shotsCount');
const shotsClassEl = document.getElementById('shotsClass');
const shotsPointsEl = document.getElementById('shotsPoints');
const fShotsEl = document.getElementById('f-shots');
const horsLimitesEl = document.getElementById('horsLimites');
const hfMaxEl = document.getElementById('hfMax');
const fPartimeEl = document.getElementById('f-partime');

function classifyShots(n) {
  if (n <= 6)  return { label: 'SPEED',           color: '#5ad99b' };
  if (n <= 8)  return { label: 'SHORT',           color: '#5ad99b' };
  if (n <= 24) return { label: 'MEDIUM',          color: 'var(--amber)' };
  if (n <= 32) return { label: 'LONG',            color: 'var(--amber)' };
  return         { label: '⚠ HORS LIMITES',       color: 'var(--red)' };
}

function updateMetrics() {
  const targets = items.filter(it => TARGET_TYPES.includes(it.type));
  const totalShots = targets.reduce((s, t) => s + (t.requiredHits || 0), 0);
  const paperCount = items.filter(it => it.type === 'paper').length;
  const points = paperCount * 5;

  shotsCountEl.textContent = totalShots;
  fShotsEl.value = totalShots;

  const cls = classifyShots(totalShots);
  shotsClassEl.textContent = cls.label;
  shotsClassEl.style.color = cls.color;

  shotsPointsEl.textContent = `POINTS DISPO : ${points}`;

  const partime = parseFloat(fPartimeEl.value);
  const validPartime = isFinite(partime) && partime > 0 ? partime : 0;
  const hf = validPartime > 0 ? points / validPartime : 0;
  hfMaxEl.textContent = `HF MAX : ${hf.toFixed(2)}`;

  if (totalShots > 32) {
    horsLimitesEl.textContent = `⚠ STAGE HORS LIMITES IPSC — ${totalShots} COUPS`;
    horsLimitesEl.classList.add('show');
  } else {
    horsLimitesEl.classList.remove('show');
  }

  runValidation();
}
fPartimeEl.addEventListener('input', updateMetrics);

/* ──────────────  VALIDATION IPSC  ────────────── */
const validationPanel = document.getElementById('validationPanel');
const validationList  = document.getElementById('validationList');

function panTo(pos) {
  const startTarget = controls.target.clone();
  const endTarget   = new THREE.Vector3(pos.x, 0, pos.z);
  let frame = 0;
  const N = 20;
  function step() {
    frame++;
    const t = frame / N;
    const newTarget = startTarget.clone().lerp(endTarget, t);
    const delta = newTarget.clone().sub(controls.target);
    controls.target.copy(newTarget);
    camera.position.add(delta);
    if (frame < N) requestAnimationFrame(step);
  }
  step();
}

function escapeText(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function runValidation() {
  // Reset error flags
  items.forEach(it => { it.errorHighlight = false; });

  const alerts = [];
  const startbox = items.find(it => it.type === 'startbox');
  const papers   = items.filter(it => it.type === 'paper');
  const noshoots = items.filter(it => it.type === 'noshoot');
  const targetItems = items.filter(it => TARGET_TYPES.includes(it.type));
  const totalShots = targetItems.reduce((s, t) => s + (t.requiredHits || 0), 0);

  // Build numbering maps (T#, HC#, NS#)
  const tLabel = new Map();
  const hcLabel = new Map();
  const nsLabel = new Map();
  let nT = 0, nHC = 0, nNS = 0;
  items.forEach(it => {
    if (TARGET_TYPES.includes(it.type)) { nT++; tLabel.set(it, 'T' + nT); }
    if (it.type === 'hardcover')        { nHC++; hcLabel.set(it, 'HC' + nHC); }
    if (it.type === 'noshoot')          { nNS++; nsLabel.set(it, 'NS' + nNS); }
  });

  // Rule 1: target too close to startbox (< 1.5m)
  if (startbox) {
    items.forEach(it => {
      if (!(TARGET_TYPES.includes(it.type) || it.type === 'hardcover')) return;
      const d = Math.hypot(
        it.mesh.position.x - startbox.mesh.position.x,
        it.mesh.position.z - startbox.mesh.position.z
      );
      if (d < 1.5) {
        const label = tLabel.get(it) || hcLabel.get(it) || '?';
        alerts.push({ message: `${label} trop proche du départ (${d.toFixed(1)}m — min 1.5m)`, item: it });
        it.errorHighlight = true;
      }
    });
  }

  // Rule 2: empty stage
  if (targetItems.length === 0 && items.length > 0) {
    alerts.push({ message: 'Aucune cible placée' });
  }

  // Rule 3: shots > 32
  if (totalShots > 32) {
    alerts.push({ message: `Coups hors limite IPSC (max 32) — ${totalShots} coups` });
  }

  // Rule 4: no-shoot isolated (no paper within 1m)
  noshoots.forEach(ns => {
    const hasPaperNearby = papers.some(p => {
      const d = Math.hypot(
        ns.mesh.position.x - p.mesh.position.x,
        ns.mesh.position.z - p.mesh.position.z
      );
      return d < 1.0;
    });
    if (!hasPaperNearby) {
      const label = nsLabel.get(ns) || 'NS';
      alerts.push({ message: `${label} isolé — aucune cible papier à proximité`, item: ns });
      ns.errorHighlight = true;
    }
  });

  // Rule 5: missing startbox
  if (targetItems.length > 0 && !startbox) {
    alerts.push({ message: 'Pas de box de départ' });
  }

  // Refresh emissives based on errorHighlight flags
  items.forEach(updateEmissive);

  // Hide panel if no objects placed at all
  if (items.length === 0) {
    validationPanel.classList.remove('show');
    validationList.innerHTML = '';
    return;
  }
  validationPanel.classList.add('show');

  if (alerts.length === 0) {
    validationList.innerHTML = `<li class="validation-row ok"><span class="icon">✓</span><span>Stage conforme IPSC</span></li>`;
    return;
  }

  validationList.innerHTML = alerts.map((a, i) => {
    const clickable = a.item ? ' clickable' : '';
    const idx = a.item ? ` data-alert-i="${i}"` : '';
    const title = a.item ? ' title="Cliquer pour centrer la caméra"' : '';
    return `<li class="validation-row warn${clickable}"${idx}${title}><span class="icon">⚠</span><span>${escapeText(a.message)}</span></li>`;
  }).join('');

  validationList.querySelectorAll('.validation-row[data-alert-i]').forEach(row => {
    const i = parseInt(row.dataset.alertI, 10);
    const alert = alerts[i];
    if (!alert || !alert.item) return;
    row.addEventListener('click', () => {
      panTo({ x: alert.item.mesh.position.x, z: alert.item.mesh.position.z });
    });
  });
}

/* ──────────────  UNDO / REDO  ────────────── */
const undoStack = [];
const redoStack = [];
const UNDO_LIMIT = 50;
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
let preDragSnapshot = null;
let preDragPos = null;

function captureState() {
  return JSON.stringify(items.map(it => {
    const o = {
      type: it.type,
      x: it.mesh.position.x,
      z: it.mesh.position.z,
      rotation: it.mesh.rotation.y,
    };
    if (TARGET_TYPES.includes(it.type)) {
      o.requiredHits = it.requiredHits;
    } else if (it.type === 'wall' || it.type === 'port') {
      o.length = it.mesh.userData.length;
      o.scaleY = it.mesh.scale.y;
      o.scaleZ = it.mesh.scale.z;
    } else if (it.type === 'arrow') {
      const mx = it.mesh.position.x;
      const mz = it.mesh.position.z;
      const theta = -it.mesh.rotation.y;
      const L = it.mesh.userData.length || 0;
      const dx = L * Math.cos(theta);
      const dz = L * Math.sin(theta);
      o.ax = mx - dx / 2;
      o.az = mz - dz / 2;
      o.bx = mx + dx / 2;
      o.bz = mz + dz / 2;
    }
    return o;
  }));
}

function pushUndo() {
  undoStack.push(captureState());
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack.length = 0;
  updateUndoRedoButtons();
  autosave();
}

function restoreState(snapshot) {
  selectItem(null);
  items.forEach(it => scene.remove(it.mesh));
  items.length = 0;
  if (wallMarker) { scene.remove(wallMarker); wallMarker = null; }
  wallStart = null;
  if (arrowMarker) { scene.remove(arrowMarker); arrowMarker = null; }
  arrowStart = null;
  if (portMarker) { scene.remove(portMarker); portMarker = null; }
  portStart = null;

  const data = JSON.parse(snapshot);
  data.forEach(o => {
    let mesh = null;
    if (o.type === 'paper')          mesh = makePaper();
    else if (o.type === 'popper')    mesh = makePopper();
    else if (o.type === 'plate')     mesh = makePlate();
    else if (o.type === 'noshoot')   mesh = makeNoShoot();
    else if (o.type === 'hardcover') mesh = makeHardCover();
    else if (o.type === 'barrel')    mesh = makeBarrel();
    else if (o.type === 'startbox')  mesh = makeStartBox();
    else if (o.type === 'wall' || o.type === 'port') {
      const theta = -(o.rotation || 0);
      const L = o.length || 0;
      const dx = L * Math.cos(theta);
      const dz = L * Math.sin(theta);
      const ax = o.x - dx / 2, az = o.z - dz / 2;
      const bx = o.x + dx / 2, bz = o.z + dz / 2;
      mesh = (o.type === 'wall') ? makeWall(ax, az, bx, bz) : makePort(ax, az, bx, bz);
      if (mesh) {
        if (typeof o.scaleY === 'number') mesh.scale.y = o.scaleY;
        if (typeof o.scaleZ === 'number') mesh.scale.z = o.scaleZ;
      }
    }
    else if (o.type === 'arrow') {
      mesh = makeArrow(o.ax, o.az, o.bx, o.bz);
    }
    if (!mesh) return;
    if (o.type !== 'wall' && o.type !== 'arrow' && o.type !== 'port') {
      mesh.position.set(o.x, 0, o.z);
      if (o.rotation) mesh.rotation.y = o.rotation;
    }
    scene.add(mesh);
    const item = { type: o.type, mesh, label: null };
    if (TARGET_TYPES.includes(o.type)) {
      item.requiredHits = (typeof o.requiredHits === 'number') ? o.requiredHits : (DEFAULT_HITS[o.type] ?? 1);
    }
    items.push(item);
  });

  refreshLabels();
  refreshArrowNumbers();
  updateUndoRedoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(captureState());
  const snap = undoStack.pop();
  restoreState(snap);
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(captureState());
  const snap = redoStack.pop();
  restoreState(snap);
}

function updateUndoRedoButtons() {
  undoBtn.classList.toggle('disabled', undoStack.length === 0);
  redoBtn.classList.toggle('disabled', redoStack.length === 0);
}
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);
updateUndoRedoButtons();

/* ──────────────  CLEAR ALL  ────────────── */
document.getElementById('clearAll').addEventListener('click', () => {
  if (items.length === 0) return;
  if (!window.confirm('Effacer toutes les cibles et murs ?')) return;
  pushUndo();
  selectItem(null);
  items.forEach(it => scene.remove(it.mesh));
  items.length = 0;
  if (wallMarker) { scene.remove(wallMarker); wallMarker = null; }
  wallStart = null;
  if (arrowMarker) { scene.remove(arrowMarker); arrowMarker = null; }
  arrowStart = null;
  if (portMarker) { scene.remove(portMarker); portMarker = null; }
  portStart = null;
  updateTargetsList();
});

/* ──────────────  COORD TOOLTIP  ────────────── */
const coordTip = document.getElementById('coordTip');
function updateCoordTip(e) {
  if (!TARGET_TYPES.includes(tool)) {
    coordTip.classList.remove('show');
    return;
  }
  setMouseFromEvent(e);
  const gp = getGroundPoint();
  if (!gp) {
    coordTip.classList.remove('show');
    return;
  }
  const x = snap(gp.x), z = snap(gp.z);
  const sb = items.find(it => it.type === 'startbox');
  let extra = '';
  let warn = false;
  if (sb) {
    const d = Math.hypot(x - sb.mesh.position.x, z - sb.mesh.position.z);
    const close = d < 1.0;
    extra = `<div${close ? ' class="warn-line"' : ''}>DIST BOX: ${d.toFixed(1)}M</div>`;
    if (close) {
      extra += `<div class="warn-line">⚠ TROP PROCHE</div>`;
      warn = true;
    }
  }
  coordTip.innerHTML = `<div>X: ${x.toFixed(1)}M &nbsp; Z: ${z.toFixed(1)}M</div>${extra}`;
  coordTip.classList.toggle('warn', warn);
  coordTip.classList.add('show');
  coordTip.style.left = (e.clientX + 16) + 'px';
  coordTip.style.top = (e.clientY + 16) + 'px';
}
renderer.domElement.addEventListener('pointermove', updateCoordTip);
renderer.domElement.addEventListener('pointerleave', () => coordTip.classList.remove('show'));

/* ──────────────  SCALE RULER  ────────────── */
const scaleLabelEl = document.getElementById('scaleLabel');
const _srA = new THREE.Vector3();
const _srB = new THREE.Vector3();
function updateScaleRuler() {
  const w = canvasHost.clientWidth;
  const h = canvasHost.clientHeight;
  if (!w || !h) return;
  _srA.copy(controls.target).project(camera);
  _srB.set(controls.target.x + 1, controls.target.y, controls.target.z).project(camera);
  const dx = (_srB.x - _srA.x) * w / 2;
  const dy = (_srB.y - _srA.y) * h / 2;
  const pxPerMeter = Math.hypot(dx, dy);
  if (pxPerMeter < 0.1) return;
  const meters = 100 / pxPerMeter;
  let label;
  if (meters >= 10) label = Math.round(meters) + 'M';
  else if (meters >= 1) label = meters.toFixed(1) + 'M';
  else label = Math.round(meters * 100) + 'CM';
  scaleLabelEl.textContent = label;
}

/* ──────────────  GRID LABELS  ────────────── */
const HORIZ_LABELS = [0, 5, 10, 15, 20, 25, 30];
const VERT_LABELS = [0, 5, 10, 15, 20];
const gridLabelEls = [];
HORIZ_LABELS.forEach(m => {
  const el = document.createElement('div');
  el.className = 'grid-label';
  el.textContent = m + 'M';
  canvasHost.appendChild(el);
  gridLabelEls.push({ el, world: new THREE.Vector3(-15 + m, 0, 10.5) });
});
VERT_LABELS.forEach(m => {
  const el = document.createElement('div');
  el.className = 'grid-label';
  el.textContent = m + 'M';
  canvasHost.appendChild(el);
  gridLabelEls.push({ el, world: new THREE.Vector3(-15.5, 0, -10 + m) });
});
const _glP = new THREE.Vector3();
function updateGridLabels() {
  const w = canvasHost.clientWidth;
  const h = canvasHost.clientHeight;
  if (!w || !h) return;
  gridLabelEls.forEach(({ el, world }) => {
    _glP.copy(world).project(camera);
    if (_glP.z > 1 || _glP.z < -1) { el.style.opacity = '0'; return; }
    const sx = (_glP.x + 1) * w / 2;
    const sy = (-_glP.y + 1) * h / 2;
    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
    el.style.opacity = (sx > 0 && sx < w && sy > 0 && sy < h) ? '1' : '0';
  });
}

/* ──────────────  RENDER LOOP  ────────────── */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateScaleRuler();
  updateGridLabels();
  renderer.render(scene, camera);
}
animate();
updateTargetsList();

/* ──────────────  PDF EXPORT — MATCH BOOK QUALITY  ────────────── */
function drawDiagram2D() {
  const W = 900, H = 600;
  const MARGIN_M = 2;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Compute bounding box (world units)
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  const include = (x, z) => {
    if (x < minX) minX = x;
    if (x > maxX) maxX = x;
    if (z < minZ) minZ = z;
    if (z > maxZ) maxZ = z;
  };

  items.forEach(it => {
    if (it.type === 'wall' || it.type === 'arrow' || it.type === 'port') {
      const mx = it.mesh.position.x;
      const mz = it.mesh.position.z;
      const theta = -it.mesh.rotation.y;
      const L = it.mesh.userData.length || 0;
      const dx = L * Math.cos(theta);
      const dz = L * Math.sin(theta);
      include(mx - dx / 2, mz - dz / 2);
      include(mx + dx / 2, mz + dz / 2);
    } else if (it.type === 'startbox') {
      const x = it.mesh.position.x, z = it.mesh.position.z;
      include(x - 0.75, z - 0.5);
      include(x + 0.75, z + 0.5);
    } else {
      include(it.mesh.position.x, it.mesh.position.z);
    }
  });

  if (!isFinite(minX)) { minX = -2; maxX = 2; minZ = -2; maxZ = 2; }

  // Scale to fit (preserves aspect)
  const contentW = (maxX - minX) + 2 * MARGIN_M;
  const contentH = (maxZ - minZ) + 2 * MARGIN_M;
  const scale = Math.min(W / contentW, H / contentH);
  const padX = (W - contentW * scale) / 2;
  const padY = (H - contentH * scale) / 2;
  const projX = (x) => padX + (x - minX + MARGIN_M) * scale;
  const projY = (z) => padY + (z - minZ + MARGIN_M) * scale;

  const wxStart = Math.floor(minX - MARGIN_M);
  const wxEnd   = Math.ceil(maxX + MARGIN_M);
  const wzStart = Math.floor(minZ - MARGIN_M);
  const wzEnd   = Math.ceil(maxZ + MARGIN_M);

  // Minor grid (1m, #eeeeee)
  ctx.strokeStyle = '#eeeeee';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let wx = wxStart; wx <= wxEnd; wx++) {
    const cx = projX(wx);
    ctx.moveTo(cx, 0); ctx.lineTo(cx, H);
  }
  for (let wz = wzStart; wz <= wzEnd; wz++) {
    const cy = projY(wz);
    ctx.moveTo(0, cy); ctx.lineTo(W, cy);
  }
  ctx.stroke();

  // Major grid (5m, #dddddd)
  ctx.strokeStyle = '#dddddd';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const major5 = (v) => Math.ceil(v / 5) * 5;
  for (let wx = major5(wxStart); wx <= wxEnd; wx += 5) {
    const cx = projX(wx);
    ctx.moveTo(cx, 0); ctx.lineTo(cx, H);
  }
  for (let wz = major5(wzStart); wz <= wzEnd; wz += 5) {
    const cy = projY(wz);
    ctx.moveTo(0, cy); ctx.lineTo(W, cy);
  }
  ctx.stroke();

  // Axis labels (every 5m, gray on edges)
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '8px sans-serif';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  for (let wx = major5(wxStart); wx <= wxEnd; wx += 5) {
    const cx = projX(wx);
    if (cx >= 10 && cx <= W - 10) ctx.fillText(wx + 'm', cx, 4);
  }
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  for (let wz = major5(wzStart); wz <= wzEnd; wz += 5) {
    const cy = projY(wz);
    if (cy >= 10 && cy <= H - 10) ctx.fillText(wz + 'm', 4, cy);
  }
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';

  /* ── Shape draws ── */
  function labelAbove(px, py, label, dy) {
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, px, py - dy);
    ctx.restore();
  }

  function drawPaper(px, py, label, rot) {
    const w = 35, h = 50;
    ctx.save();
    ctx.translate(px, py);
    if (rot) ctx.rotate(rot);
    ctx.fillStyle = '#f5e6c8';
    ctx.fillRect(-w / 2, -h / 2, w, h);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeRect(-w / 2, -h / 2, w, h);
    // Zone C (dashed)
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 2]);
    ctx.strokeRect(-13, -19, 26, 38);
    ctx.setLineDash([]);
    // Zone A (solid)
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -11, 14, 22);
    ctx.restore();
    labelAbove(px, py, label, h / 2 + 4);
  }

  function drawPopper(px, py, label, rot) {
    const bW = 28, tW = 16, h = 38;
    ctx.save();
    ctx.translate(px, py);
    if (rot) ctx.rotate(rot);
    ctx.fillStyle = '#d0d0d0';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-tW / 2, -h / 2);
    ctx.lineTo( tW / 2, -h / 2);
    ctx.lineTo( bW / 2,  h / 2);
    ctx.lineTo(-bW / 2,  h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    labelAbove(px, py, label, h / 2 + 4);
  }

  function drawPlate(px, py, label, rot) {
    const R = 14;
    ctx.save();
    ctx.translate(px, py);
    if (rot) ctx.rotate(rot);
    ctx.fillStyle = '#d0d0d0';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    labelAbove(px, py, label, R + 4);
  }

  function drawNoShoot(px, py, label, rot) {
    const w = 35, h = 50;
    ctx.save();
    ctx.translate(px, py);
    if (rot) ctx.rotate(rot);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-w / 2, -h / 2, w, h);
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(-w / 2, -h / 2, w, h);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-w / 2, -h / 2); ctx.lineTo( w / 2,  h / 2);
    ctx.moveTo( w / 2, -h / 2); ctx.lineTo(-w / 2,  h / 2);
    ctx.stroke();
    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('NS', 0, 0);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
    labelAbove(px, py, label, h / 2 + 4);
  }

  function drawWall(ax, ay, bx, by) {
    ctx.save();
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 8;
    ctx.lineCap = 'square';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.restore();
  }

  function drawPort(ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len = Math.hypot(dx, dy);
    if (len < 1) return;
    const ux = dx / len, uy = dy / len;
    const segL = len * 0.4;
    // Two segments: ax→ax+segL*u and bx-segL*u→bx, gap in the middle
    const l2x = ax + segL * ux, l2y = ay + segL * uy;
    const r1x = bx - segL * ux, r1y = by - segL * uy;
    ctx.save();
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 8;
    ctx.lineCap = 'square';
    ctx.beginPath();
    ctx.moveTo(ax, ay); ctx.lineTo(l2x, l2y);
    ctx.moveTo(r1x, r1y); ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.restore();
  }

  function drawHardCover(px, py, label, rot) {
    const w = 35, h = 50;
    ctx.save();
    ctx.translate(px, py);
    if (rot) ctx.rotate(rot);
    ctx.fillStyle = '#c8d4f0';
    ctx.fillRect(-w / 2, -h / 2, w, h);
    ctx.strokeStyle = '#3a3aff';
    ctx.lineWidth = 2;
    ctx.strokeRect(-w / 2, -h / 2, w, h);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-w / 2, -h / 2); ctx.lineTo( w / 2,  h / 2);
    ctx.moveTo( w / 2, -h / 2); ctx.lineTo(-w / 2,  h / 2);
    ctx.stroke();
    ctx.fillStyle = '#3a3aff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('HC', 0, 0);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
    labelAbove(px, py, label, h / 2 + 4);
  }

  function drawBarrel(px, py) {
    ctx.save();
    ctx.fillStyle = '#8a6a3a';
    ctx.beginPath();
    ctx.arc(px, py, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 1;
    [8, 5, 2].forEach(r => {
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.fillStyle = '#000';
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PROP', px, py + 22);
    ctx.restore();
  }

  function drawArrow(ax, ay, bx, by, num) {
    ctx.save();
    ctx.strokeStyle = '#2a8a4a';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.setLineDash([]);
    // Arrowhead
    const angle = Math.atan2(by - ay, bx - ax);
    const hL = 10, hW = 0.5;
    ctx.fillStyle = '#2a8a4a';
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx - hL * Math.cos(angle - hW), by - hL * Math.sin(angle - hW));
    ctx.lineTo(bx - hL * Math.cos(angle + hW), by - hL * Math.sin(angle + hW));
    ctx.closePath();
    ctx.fill();
    // Sequence circle at midpoint
    const mx = (ax + bx) / 2, my = (ay + by) / 2;
    ctx.beginPath();
    ctx.arc(mx, my, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(num), mx, my);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  function drawStartBox(px, py) {
    const w = 1.5 * scale, h = 1.0 * scale;
    ctx.save();
    ctx.fillStyle = 'rgba(204, 0, 0, 0.05)';
    ctx.fillRect(px - w / 2, py - h / 2, w, h);
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(px - w / 2, py - h / 2, w, h);
    ctx.setLineDash([]);
    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('START', px, py);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Draw order: walls + ports (background) → startbox → arrows → barrels → targets + hardcovers (foreground)
  items.forEach(it => {
    if (it.type !== 'wall' && it.type !== 'port') return;
    const mx = it.mesh.position.x, mz = it.mesh.position.z;
    const theta = -it.mesh.rotation.y;
    const L = it.mesh.userData.length || 0;
    const dx = L * Math.cos(theta), dz = L * Math.sin(theta);
    const ax = projX(mx - dx / 2), ay = projY(mz - dz / 2);
    const bx = projX(mx + dx / 2), by = projY(mz + dz / 2);
    if (it.type === 'wall') drawWall(ax, ay, bx, by);
    else                    drawPort(ax, ay, bx, by);
  });

  items.forEach(it => {
    if (it.type !== 'startbox') return;
    drawStartBox(projX(it.mesh.position.x), projY(it.mesh.position.z));
  });

  let arrowN = 0;
  items.forEach(it => {
    if (it.type !== 'arrow') return;
    arrowN++;
    const mx = it.mesh.position.x, mz = it.mesh.position.z;
    const theta = -it.mesh.rotation.y;
    const L = it.mesh.userData.length || 0;
    const dx = L * Math.cos(theta), dz = L * Math.sin(theta);
    drawArrow(projX(mx - dx / 2), projY(mz - dz / 2), projX(mx + dx / 2), projY(mz + dz / 2), arrowN);
  });

  items.forEach(it => {
    if (it.type !== 'barrel') return;
    drawBarrel(projX(it.mesh.position.x), projY(it.mesh.position.z));
  });

  let tn = 0, hcn = 0;
  items.forEach(it => {
    const px = projX(it.mesh.position.x);
    const py = projY(it.mesh.position.z);
    const rot = it.mesh.rotation.y || 0;
    if (TARGET_TYPES.includes(it.type)) {
      tn++;
      const label = 'T' + tn;
      if      (it.type === 'paper')   drawPaper(px, py, label, rot);
      else if (it.type === 'popper')  drawPopper(px, py, label, rot);
      else if (it.type === 'plate')   drawPlate(px, py, label, rot);
      else if (it.type === 'noshoot') drawNoShoot(px, py, label, rot);
    } else if (it.type === 'hardcover') {
      hcn++;
      drawHardCover(px, py, 'HC' + hcn, rot);
    }
  });

  // Outer frame
  ctx.strokeStyle = '#999999';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

  return canvas.toDataURL('image/png');
}

function pdfFooter(pdf, PW, PH) {
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(7);
  pdf.setTextColor(150);
  pdf.text('Généré avec OpMind Stage Creator — opmind.fr', PW / 2, PH - 6, { align: 'center' });
  pdf.setTextColor(0);
}

document.getElementById('exportPdf').addEventListener('click', () => {
  const name = (document.getElementById('stageName').value || 'STAGE SANS NOM').trim();
  const data = {
    name,
    procedure:    document.getElementById('f-procedure').value.trim(),
    startPos:     document.getElementById('f-startpos').value.trim(),
    startTime:    document.getElementById('f-starttime').value.trim(),
    gunReady:     document.getElementById('f-gunready').value.trim(),
    shooterReady: document.getElementById('f-shooterready').value.trim(),
  };

  const targets    = items.filter(it => TARGET_TYPES.includes(it.type));
  const papers     = items.filter(it => it.type === 'paper');
  const totalShots = targets.reduce((s, t) => s + (t.requiredHits || 0), 0);
  const points     = papers.length * 5;
  const partime    = parseFloat(document.getElementById('f-partime').value) || 30;
  const hfMax      = partime > 0 ? points / partime : 0;
  const cls        = classifyShots(totalShots).label;

  const diagram = drawDiagram2D();

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
  const PW = pdf.internal.pageSize.getWidth();   // 297
  const PH = pdf.internal.pageSize.getHeight();  // 210
  const M  = 12;

  /* ═══ PAGE 1 — STAGE SHEET ═══ */

  // Header
  pdf.setTextColor(0);
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(14);
  pdf.text('OPMIND', M, 15);

  pdf.setFontSize(16);
  pdf.text(data.name.toUpperCase(), PW / 2, 15, { align: 'center' });

  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(11);
  pdf.text('STAGE 01', PW - M, 15, { align: 'right' });

  pdf.setDrawColor(0);
  pdf.setLineWidth(0.5);
  pdf.line(M, 20, PW - M, 20);

  // Metrics band
  pdf.setFillColor(26, 26, 26);
  pdf.rect(M, 24, PW - 2 * M, 10, 'F');
  pdf.setTextColor(255);
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(9);
  const colW = (PW - 2 * M) / 4;
  const metricsTexts = [
    `COUPS: ${totalShots}`,
    `TYPE: ${cls}`,
    `POINTS: ${points}`,
    `HF MAX: ${hfMax.toFixed(2)}`,
  ];
  for (let i = 0; i < 4; i++) {
    pdf.text(metricsTexts[i], M + colW * i + colW / 2, 30.5, { align: 'center' });
  }
  pdf.setTextColor(0);

  // Content area
  const top    = 40;
  const bottom = PH - 12;

  // Diagram (60% left)
  const diagW = (PW - 2 * M) * 0.60;
  const diagH = diagW * (600 / 900);
  pdf.setFillColor(255, 255, 255);
  pdf.rect(M, top, diagW, diagH, 'F');
  pdf.addImage(diagram, 'PNG', M, top, diagW, diagH);
  pdf.setDrawColor(180);
  pdf.setLineWidth(0.5);
  pdf.rect(M, top, diagW, diagH);

  // Right column
  const rightX = M + diagW + 6;
  const rightW = (PW - M) - rightX;
  let ry = top;

  // PROCÉDURE
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(7);
  pdf.setTextColor(136, 136, 136);
  pdf.text('PROCÉDURE', rightX, ry);
  ry += 3.5;

  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(9);
  pdf.setTextColor(0);
  const procLines = pdf.splitTextToSize(data.procedure || '—', rightW);
  pdf.text(procLines, rightX, ry);
  ry += procLines.length * 4 + 4;

  // Metadata fields
  const meta = [
    ['POSITION INITIALE', data.startPos],
    ['TEMPS DÉPART',      data.startTime],
    ['ARME PRÊTE',        data.gunReady],
    ['TIREUR PRÊT',       data.shooterReady],
  ];
  for (const [label, value] of meta) {
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(7);
    pdf.setTextColor(136, 136, 136);
    pdf.text(label, rightX, ry);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9);
    pdf.setTextColor(0);
    const lines = pdf.splitTextToSize(value || '—', rightW);
    pdf.text(lines, rightX, ry + 3.5);
    ry += 6 + (lines.length - 1) * 3.5;
  }

  // Separator
  ry += 1;
  pdf.setDrawColor(220);
  pdf.setLineWidth(0.3);
  pdf.line(rightX, ry, rightX + rightW, ry);
  ry += 4;

  // CIBLES
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(7);
  pdf.setTextColor(136, 136, 136);
  pdf.text('CIBLES', rightX, ry);
  ry += 4;

  if (targets.length === 0) {
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9);
    pdf.setTextColor(180);
    pdf.text('—', rightX, ry);
  } else {
    pdf.setFontSize(8);
    targets.forEach((t, idx) => {
      if (ry > bottom - 8) return;
      if (idx % 2 === 1) {
        pdf.setFillColor(245, 245, 245);
        pdf.rect(rightX, ry - 3.5, rightW, 5, 'F');
      }
      pdf.setTextColor(232, 74, 58);
      pdf.setFont('helvetica', 'bold');
      pdf.text('T' + (idx + 1), rightX + 1, ry);
      pdf.setTextColor(0);
      pdf.setFont('helvetica', 'normal');
      pdf.text(TYPE_LABEL[t.type], rightX + 12, ry);
      pdf.text(`${t.requiredHits} COUPS`, rightX + rightW - 1, ry, { align: 'right' });
      ry += 5;
    });
  }

  pdfFooter(pdf, PW, PH);

  /* ═══ PAGE 2 — SCORING TABLE (if >0 papers) ═══ */

  if (papers.length > 0) {
    pdf.addPage();
    pdf.setTextColor(0);
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(14);
    pdf.text('OPMIND  ·  TABLEAU DE SCORING', M, 15);
    pdf.setFontSize(11);
    pdf.text(data.name.toUpperCase(), PW - M, 15, { align: 'right' });
    pdf.setDrawColor(0);
    pdf.setLineWidth(0.5);
    pdf.line(M, 20, PW - M, 20);

    const usableW = PW - 2 * M;
    const tireurW = 50;
    const totalW  = 24;
    const hfW     = 20;
    const remainW = usableW - tireurW - totalW - hfW;
    const paperW  = remainW / papers.length;

    let y2 = 28;
    const rowH = 9;

    // Header row
    pdf.setFillColor(26, 26, 26);
    pdf.rect(M, y2, usableW, rowH, 'F');
    pdf.setTextColor(255);
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(9);
    pdf.text('TIREUR', M + tireurW / 2, y2 + 5.8, { align: 'center' });
    let cx = M + tireurW;
    for (let i = 0; i < papers.length; i++) {
      pdf.text(`T${i + 1}`, cx + paperW / 2, y2 + 5.8, { align: 'center' });
      cx += paperW;
    }
    pdf.text('TOTAL', cx + totalW / 2, y2 + 5.8, { align: 'center' });
    cx += totalW;
    pdf.text('HF', cx + hfW / 2, y2 + 5.8, { align: 'center' });
    y2 += rowH;

    // 15 empty rows
    pdf.setTextColor(0);
    pdf.setDrawColor(210);
    pdf.setLineWidth(0.2);
    for (let r = 0; r < 15; r++) {
      if (r % 2 === 1) {
        pdf.setFillColor(245, 245, 245);
        pdf.rect(M, y2, usableW, rowH, 'F');
      }
      pdf.line(M, y2 + rowH, M + usableW, y2 + rowH);
      let bx = M;
      pdf.line(bx, y2, bx, y2 + rowH);
      bx += tireurW;
      pdf.line(bx, y2, bx, y2 + rowH);
      for (let i = 0; i < papers.length; i++) {
        bx += paperW;
        pdf.line(bx, y2, bx, y2 + rowH);
      }
      bx += totalW;
      pdf.line(bx, y2, bx, y2 + rowH);
      bx += hfW;
      pdf.line(bx, y2, bx, y2 + rowH);
      y2 += rowH;
    }

    pdfFooter(pdf, PW, PH);
  }

  // Filename: [nom-du-stage]-stage.pdf
  const safe = data.name.toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-_]+/g, '')
    .replace(/^-+|-+$/g, '') || 'stage';
  const filename = `${safe}-stage.pdf`;
  pdf.save(filename);
  showSignup(filename);
});

function hideBanner() {
  ioBanner.className = 'io-banner';
  ioBanner.innerHTML = '';
  if (bannerTimeout) { clearTimeout(bannerTimeout); bannerTimeout = null; }
}

function showBanner(message, type, duration, actions) {
  if (bannerTimeout) { clearTimeout(bannerTimeout); bannerTimeout = null; }
  ioBanner.className = 'io-banner show' + (type ? ' ' + type : '');
  let html = `<span>${message}</span>`;
  if (actions && actions.length) {
    actions.forEach((a, i) => {
      html += `<button data-action-i="${i}"${a.primary ? ' class="primary"' : ''}>${a.label}</button>`;
    });
  }
  ioBanner.innerHTML = html;
  if (actions && actions.length) {
    ioBanner.querySelectorAll('button').forEach(btn => {
      const i = parseInt(btn.dataset.actionI, 10);
      btn.addEventListener('click', () => {
        actions[i].onClick();
        hideBanner();
      });
    });
  } else if (duration > 0) {
    bannerTimeout = setTimeout(hideBanner, duration);
  }
}

function serializeStage() {
  const objects = items.map(it => {
    if (TARGET_TYPES.includes(it.type)) {
      return {
        type: it.type,
        x: it.mesh.position.x,
        z: it.mesh.position.z,
        rotation: it.mesh.rotation.y,
        requiredHits: it.requiredHits,
        label: '',
      };
    } else if (it.type === 'wall' || it.type === 'arrow' || it.type === 'port') {
      const mx = it.mesh.position.x;
      const mz = it.mesh.position.z;
      const theta = -it.mesh.rotation.y;
      const L = it.mesh.userData.length || 0;
      const dx = L * Math.cos(theta);
      const dz = L * Math.sin(theta);
      const o = {
        type: it.type,
        ax: mx - dx / 2, az: mz - dz / 2,
        bx: mx + dx / 2, bz: mz + dz / 2,
      };
      if (it.type === 'wall' || it.type === 'port') {
        o.scaleY = it.mesh.scale.y;
        o.scaleZ = it.mesh.scale.z;
      }
      return o;
    } else if (it.type === 'hardcover' || it.type === 'barrel') {
      return {
        type: it.type,
        x: it.mesh.position.x,
        z: it.mesh.position.z,
        rotation: it.mesh.rotation.y,
      };
    } else if (it.type === 'startbox') {
      return { type: 'startbox', x: it.mesh.position.x, z: it.mesh.position.z };
    }
    return null;
  }).filter(Boolean);

  // Attach proper target labels (T1, T2…)
  let tn = 0;
  objects.forEach(o => {
    if (TARGET_TYPES.includes(o.type)) {
      tn++;
      o.label = 'T' + tn;
    }
  });

  return {
    version: 1,
    name: (document.getElementById('stageName').value || 'STAGE SANS NOM').trim(),
    metadata: {
      shots:        parseInt(document.getElementById('f-shots').value, 10) || 0,
      targets:      document.getElementById('f-counted').value || '',
      procedure:    document.getElementById('f-procedure').value || '',
      startPosition:document.getElementById('f-startpos').value || '',
      timeStart:    document.getElementById('f-starttime').value || '',
      gunReady:     document.getElementById('f-gunready').value || '',
      shooterReady: document.getElementById('f-shooterready').value || '',
      parTime:      parseFloat(document.getElementById('f-partime').value) || 30,
    },
    objects,
  };
}

function deserializeStage(json) {
  if (!json || json.version !== 1) throw new Error('Invalid version');
  if (!Array.isArray(json.objects)) throw new Error('Invalid objects');

  document.getElementById('stageName').value = (json.name || 'STAGE SANS NOM');
  const md = json.metadata || {};
  document.getElementById('f-counted').value      = md.targets      || '';
  document.getElementById('f-procedure').value    = md.procedure    || '';
  document.getElementById('f-startpos').value     = md.startPosition|| '';
  document.getElementById('f-starttime').value    = md.timeStart    || '';
  document.getElementById('f-gunready').value     = md.gunReady     || '';
  document.getElementById('f-shooterready').value = md.shooterReady || '';
  document.getElementById('f-partime').value      = (md.parTime != null ? md.parTime : 30);

  // Convert save format into the internal snapshot shape consumed by restoreState
  const internal = json.objects.map(o => {
    if (TARGET_TYPES.includes(o.type)) {
      return {
        type: o.type,
        x: Number(o.x) || 0,
        z: Number(o.z) || 0,
        rotation: Number(o.rotation) || 0,
        requiredHits: (typeof o.requiredHits === 'number') ? o.requiredHits : (DEFAULT_HITS[o.type] ?? 1),
      };
    } else if (o.type === 'wall' || o.type === 'port') {
      const dx = (o.bx - o.ax), dz = (o.bz - o.az);
      const length = Math.hypot(dx, dz);
      const angle = Math.atan2(dz, dx);
      return {
        type: o.type,
        x: (o.ax + o.bx) / 2,
        z: (o.az + o.bz) / 2,
        rotation: -angle,
        length,
        scaleY: typeof o.scaleY === 'number' ? o.scaleY : 1,
        scaleZ: typeof o.scaleZ === 'number' ? o.scaleZ : 1,
      };
    } else if (o.type === 'arrow') {
      return { type: 'arrow', ax: Number(o.ax), az: Number(o.az), bx: Number(o.bx), bz: Number(o.bz), rotation: 0 };
    } else if (o.type === 'hardcover' || o.type === 'barrel') {
      return {
        type: o.type,
        x: Number(o.x) || 0,
        z: Number(o.z) || 0,
        rotation: Number(o.rotation) || 0,
      };
    } else if (o.type === 'startbox') {
      return { type: 'startbox', x: Number(o.x) || 0, z: Number(o.z) || 0, rotation: 0 };
    }
    return null;
  }).filter(Boolean);

  restoreState(JSON.stringify(internal));
  // restoreState clears undo/redo? No, it pushes nothing. Reset stacks for clean slate after load.
  undoStack.length = 0;
  redoStack.length = 0;
  updateUndoRedoButtons();
  updateMetrics();
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function safeStageName(name) {
  return (name || 'stage').replace(/[^a-z0-9\-_]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'stage';
}

const templatesModal     = document.getElementById('templatesModal');
const templatesGrid      = document.getElementById('templatesGrid');
const templatesCloseBtn  = document.getElementById('templatesCloseBtn');
const templatesBtn       = document.getElementById('templatesBtn');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function renderTemplates() {
  templatesGrid.innerHTML = '';
  TEMPLATES.forEach((t) => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'template-card' + (t.empty ? ' empty' : '');
    if (t.empty) {
      card.innerHTML = `<div class="t-name">${escapeHtml(t.description)}</div>`;
    } else {
      card.innerHTML = `
        <div class="t-name">${escapeHtml(t.name)}</div>
        <span class="t-badge ${t.type.toLowerCase()}">${escapeHtml(t.type)}</span>
        <div class="t-stats">${escapeHtml(t.shotsLabel)}</div>
        <div class="t-desc">${escapeHtml(t.description)}</div>
      `;
    }
    card.addEventListener('click', () => {
      applyTemplate(t);
      closeTemplatesModal();
    });
    templatesGrid.appendChild(card);
  });
}

function applyTemplate(t) {
  pushUndo();

  // Clear scene
  selectItem(null);
  items.forEach(it => scene.remove(it.mesh));
  items.length = 0;
  if (wallMarker)  { scene.remove(wallMarker);  wallMarker  = null; }
  wallStart = null;
  if (arrowMarker) { scene.remove(arrowMarker); arrowMarker = null; }
  arrowStart = null;
  if (portMarker)  { scene.remove(portMarker);  portMarker  = null; }
  portStart = null;

  // Metadata
  document.getElementById('stageName').value = t.empty ? 'STAGE SANS NOM' : t.name;
  const md = t.metadata || {};
  document.getElementById('f-procedure').value    = md.procedure    || '';
  document.getElementById('f-startpos').value     = md.startPos     || '';
  document.getElementById('f-starttime').value    = md.timeStart    || '';
  document.getElementById('f-gunready').value     = md.gunReady     || '';
  document.getElementById('f-shooterready').value = md.shooterReady || '';
  document.getElementById('f-counted').value      = md.targets      || '';
  document.getElementById('f-partime').value      = (md.parTime != null ? md.parTime : 30);

  // Build objects via existing makeXxx
  (t.objects || []).forEach(o => {
    if (TARGET_TYPES.includes(o.type)) {
      const item = placeTarget(o.type, o.x, o.z);
      if (item) {
        if (typeof o.requiredHits === 'number') item.requiredHits = o.requiredHits;
        if (o.rotation) item.mesh.rotation.y = o.rotation;
      }
    } else if (o.type === 'wall') {
      const mesh = makeWall(o.ax, o.az, o.bx, o.bz);
      if (mesh) {
        scene.add(mesh);
        items.push({ type: 'wall', mesh });
      }
    } else if (o.type === 'arrow') {
      const mesh = makeArrow(o.ax, o.az, o.bx, o.bz);
      if (mesh) {
        scene.add(mesh);
        items.push({ type: 'arrow', mesh, label: null });
      }
    } else if (o.type === 'startbox') {
      const mesh = makeStartBox();
      mesh.position.set(o.x, 0, o.z);
      scene.add(mesh);
      items.push({ type: 'startbox', mesh });
    }
  });

  refreshLabels();
  refreshArrowNumbers();
  updateMetrics();
}

function openTemplatesModal() {
  templatesModal.classList.add('open');
}
function closeTemplatesModal() {
  templatesModal.classList.remove('open');
}

templatesBtn.addEventListener('click', openTemplatesModal);
templatesCloseBtn.addEventListener('click', closeTemplatesModal);
templatesModal.addEventListener('click', (e) => {
  if (e.target === templatesModal || e.target.classList.contains('modal-overlay')) {
    closeTemplatesModal();
  }
});
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && templatesModal.classList.contains('open')) {
    closeTemplatesModal();
  }
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const data = serializeStage();
  downloadJSON(`${safeStageName(data.name)}.opmind.json`, data);
});

document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('loadFile').click();
});

document.getElementById('loadFile').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const json = JSON.parse(text);
    deserializeStage(json);
    showBanner(`STAGE CHARGÉ — ${json.name || ''}`, 'success', 3000);
  } catch (err) {
    showBanner('FICHIER INVALIDE', 'error', 3000);
  }
  e.target.value = '';
});

document.getElementById('shareBtn').addEventListener('click', async () => {
  try {
    const data = serializeStage();
    const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(data));
    const url = window.location.origin + window.location.pathname + '?stage=' + compressed;
    await navigator.clipboard.writeText(url);
    showBanner('URL COPIÉE ✓', 'success', 3000);
  } catch (err) {
    showBanner('IMPOSSIBLE DE COPIER', 'error', 3000);
  }
});

function autosave() {
  if (items.length === 0) return; // skip empty stages
  try {
    const data = serializeStage();
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      stage: data,
      savedAt: new Date().toISOString(),
    }));
  } catch (err) { /* quota / serialization error — ignore */ }
}
setInterval(autosave, 30000);

function tryLoadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const stage = params.get('stage');
  if (!stage) return false;
  try {
    const decoded = LZString.decompressFromEncodedURIComponent(stage);
    if (!decoded) throw new Error('decompress failed');
    const json = JSON.parse(decoded);
    deserializeStage(json);
    showBanner(`STAGE CHARGÉ — ${json.name || ''}`, 'success', 3000);
  } catch (err) {
    showBanner('URL INVALIDE', 'error', 3000);
  }
  return true; // ?stage= was present (even if invalid)
}

function checkAutosaveRestore() {
  let saved;
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return;
    saved = JSON.parse(raw);
    if (!saved || !saved.stage) throw new Error('bad shape');
  } catch (err) {
    localStorage.removeItem(AUTOSAVE_KEY);
    return;
  }
  const name = (saved.stage.name || 'STAGE').toUpperCase();
  let dateStr = '';
  try { dateStr = new Date(saved.savedAt).toLocaleString('fr-FR'); } catch (e) { dateStr = ''; }
  showBanner(
    `REPRISE AUTOMATIQUE — ${name}${dateStr ? ' · ' + dateStr : ''}`,
    '',
    0,
    [
      { label: 'IGNORER',  onClick: () => { localStorage.removeItem(AUTOSAVE_KEY); } },
      { label: 'RESTAURER', primary: true, onClick: () => {
        try {
          deserializeStage(saved.stage);
          showBanner(`STAGE CHARGÉ — ${saved.stage.name || ''}`, 'success', 3000);
        } catch (err) {
          showBanner('AUTOSAVE INVALIDE', 'error', 3000);
          localStorage.removeItem(AUTOSAVE_KEY);
        }
      } },
    ]
  );
}

// Startup: URL wins over autosave
if (new URLSearchParams(window.location.search).has('stage')) {
  tryLoadFromURL();
} else {
  checkAutosaveRestore();
}

function showSignup(filename) {
  const exp = document.getElementById('exportResult');
  exp.classList.add('show');
  exp.innerHTML = `
    <span class="filename">EXPORTÉ — ${filename}</span>
    <span class="sep">|</span>
    <span>NOTIFIÉ AU LANCEMENT :</span>
    <input type="email" id="su-email" placeholder="ton@email.fr" autocomplete="email">
    <button class="send" id="su-submit">ENVOYER</button>
  `;
  const email = exp.querySelector('#su-email');
  const btn = exp.querySelector('#su-submit');
  btn.addEventListener('click', async () => {
    const v = email.value.trim();
    if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { email.focus(); return; }
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '…';
    try {
      const res = await fetch('https://iqhbxzhpndaeivrzdzyy.supabase.co/functions/v1/waitlist-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: v }),
      });
      if (!res.ok) throw new Error(String(res.status));
      exp.innerHTML = `
        <span class="filename">EXPORTÉ — ${filename}</span>
        <span class="sep">|</span>
        <span class="done">NOTÉ. À BIENTÔT.</span>
      `;
    } catch (err) {
      btn.disabled = false;
      btn.textContent = original;
    }
  });
}
